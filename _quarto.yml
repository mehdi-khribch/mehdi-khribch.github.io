  description: "Ph.D. candidate in Statistics & Machine Learning"
  site-url: https://mehdi-khribch.github.io
  favicon: images/favicon.png
  navbar:
    logo: images/favicon.png
    logo-alt: "MK"
    background: "#1b4f72"
    foreground: "#ffffff"
    left:
      - text: "About"
        href: index.qmd
      - text: "Publications"
        href: publications.qmd
      - text: "Teaching"
        href: teaching.qmd
      - text: "Talks"
        href: talks.qmd
      - text: "Blog"
        href: blog.qmd
      - text: "CV"
        href: cv.qmd
    right:
      - icon: mortarboard-fill
        href: https://scholar.google.com/citations?user=bdvW1McAAAAJ
        aria-label: Google Scholar
      - icon: github
        href: https://github.com/mehdi-khribch
      - icon: linkedin
        href: https://www.linkedin.com/in/el-mahdi-khribch/
        aria-label: LinkedIn
      - icon: envelope
        href: mailto:elmahdi.khribch@essec.edu

  page-footer:
    center: "© 2026 Mehdi Khribch"

comments:
  giscus:
    repo: mehdi-khribch/mehdi-khribch.github.io
    repo-id: "R_kgDOI6ZiGA"
    category: "Announcements"
    category-id: "DIC_kwDOI6ZiGM4C4uew"
    mapping: pathname
    reactions-enabled: true
    input-position: top
    theme: light
    language: en

format:
  html:
    theme:
      light: [cosmo, styles.scss]
    css: latex.css
    fontsize: "11.5pt"
    linestretch: 1.5
    mainfont: "Latin Modern Roman"
    monofont: "Latin Modern Mono"
    toc: false
    code-copy: true
    highlight-style: github
    include-in-header:
      - text: |
          <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css">
          <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
          <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
          <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
